name: Automated Test Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  checks: write

jobs:
  test-windows:
    name: Windows Test Suite
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -e ".[test]"
          pip install ruff

      - name: Lint (ruff)
        run: |
          ruff check . --output-format=github

      - name: Run Tests & Generate Reports
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          # 1. --html=report.html: Generates a visual test result page
          # 2. --cov-report=html: Generates a browseable folder of code coverage
          pytest tests/ `
            --cov=main `
            --cov-report=html:coverage_html_report `
            --cov-report=term `
            --html=test_results_report.html `
            --self-contained-html

      # --- Upload Artifacts for Viewing ---

      - name: Upload Test Result HTML
        if: always() # Upload even if tests fail so we can see WHY
        uses: actions/upload-artifact@v6
        with:
          name: Test-Results-Report
          path: test_results_report.html

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: Coverage-Report
          path: coverage_html_report/