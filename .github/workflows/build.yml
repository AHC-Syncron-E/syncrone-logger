name: Build & Sign Syncron-E

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 1. Setup Environment ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          pip install nuitka zstandard
          pip install pyside6 numpy pyqtgraph pyserial

      # --- 2. Compile with Nuitka ---
      - name: Compile Standalone (Main.dist)
        run: |
          python -m nuitka --standalone `
            --assume-yes-for-downloads `
            --enable-plugin=pyside6 `
            --include-module=PySide6.QtOpenGL `
            --include-module=PySide6.QtOpenGLWidgets `
            --windows-icon-from-ico=icon.ico `
            --windows-console-mode=disable `
            --company-name="Autonomous Healthcare Inc." `
            --product-name="Syncron-E" `
            --file-version="1.0.0.0" `
            --product-version="1.0.0.0" `
            main.py

      # --- 2.5. Sign EVERYTHING (Recursive) ---
      # This ensures main.exe AND all nested DLLs (numpy, PySide6) are signed.
      - name: Sign Main.dist Recursively
        uses: azure/artifact-signing-action@v1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
          files-folder: main.dist
          files-folder-filter: "*.exe,*.dll,*.pyd"
          # CRITICAL FIX: Enable recursion to reach subdirectories
          files-folder-recurse: true
          file-digest: sha256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: sha256

      # --- 3. Package Plan B (Portable Zip) ---
      # We zip the signed directory so it is ready for USB distribution
      - name: Create Portable Zip
        run: |
          Compress-Archive -Path main.dist -DestinationPath Syncron-E-Portable.zip

      # --- 4. Package Plan A (SFX Installer) ---
      - name: Create Installer (SFX)
        run: |
          .\build_installer.ps1

      # --- 5. Sign the SFX Installer ---
      - name: Sign Outer Installer (SFX)
        uses: azure/artifact-signing-action@v1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
          files-folder: .
          files-folder-filter: "Syncron-E CD Logger.exe"
          file-digest: sha256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: sha256

      # --- 6. Upload Artifacts ---

      # Upload Plan A: The Installer
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: Syncron-E-Installer
          path: "Syncron-E CD Logger.exe"

      # Upload Plan B: The Portable Zip
      - name: Upload Portable Version
        uses: actions/upload-artifact@v4
        with:
          name: Syncron-E-Portable
          path: "Syncron-E-Portable.zip"