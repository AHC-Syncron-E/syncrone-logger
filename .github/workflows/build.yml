name: Build & Sign Syncron-E

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 1. Setup Environment ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          pip install nuitka zstandard
          # Updated to match your environment.yml
          pip install pyside6 numpy pyqtgraph pyserial

      # --- 2. Compile with Nuitka ---
      - name: Compile Standalone (Main.dist)
        run: |
          python -m nuitka --standalone `
            --enable-plugin=pyside6 `
            --enable-plugin=numpy `
            --include-module=PySide6.QtOpenGL `
            --include-module=PySide6.QtOpenGLWidgets `
            --windows-icon-from-ico=icon.ico `
            --windows-console-mode=disable `
            --company-name="Autonomous Healthcare Inc." `
            --product-name="Syncron-E" `
            --file-version="1.0.0.0" `
            --product-version="1.0.0.0" `
            main.py

      # --- 3. Package SFX ---
      - name: Create Installer (SFX)
        run: |
          .\build_installer.ps1

      # --- 4. Sign the Installer ---
      - name: Azure Artifact Signing
        uses: azure/artifact-signing-action@v1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
          files-folder: .
          files-folder-filter: "Syncron-E CD Logger.exe"
          file-digest: sha256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: sha256

      # --- 5. Upload Artifact ---
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Syncron-E-Installer
          path: "Syncron-E CD Logger.exe"